version: 2

sources:
  - name: btc
    database: btc
    schema: btc_schema
    tables:
      - name: btc
        config:
          freshness:
            warn_after: { count: 1, period: hour }
            error_after: { count: 3, period: hour }
          loaded_at_field: BLOCK_TIMESTAMP

  - name: CUSTOMERS
    database: CUSTOMERS
    schema: CUSTOMERS
    tables:
      - name: CUSTOMER_STATUS
